# ================================
# Server Configuration
# ================================
server.port=8080

# ================================
# Database Configuration
# ================================
spring.datasource.url=jdbc:mysql://localhost:3306/helpdesk_db_capstone
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================
# JPA / Hibernate Configuration
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ================================
# Application Name
# ================================
spring.application.name=helpdesk-backend

# ================================
# JWT Configuration (we'll use this on Day 5)
# ================================
app.jwt.secret=helpdeskCapstoneSecretKey2024SuperSecureKey
app.jwt.expiration=86400000

# ================================
# Logging
# ================================
logging.level.com.helpdesk=DEBUG
logging.level.org.springframework.security=DEBUG